data:
  start_date: 2019-01-01
  end_date: 2025-12-31
  snapshot_dir: data/graphs/snapshots
  features_dir: data/features
  split:
    train_end: 1150   # indices 0–1149  (70%)
    val_end:   1397   # indices 1150–1396 (15%)
    # test:    indices 1397–1642         (15%)

model:
  architecture: magnet  # magnet | baseline_lstm | baseline_tw_gnn | magnet_no_a12（M6 Stage 0 ablation）
  lstm:
    input_dim: 9          # F = 9 維技術指標特徵
    hidden_dim: 64
    num_layers: 1
    T_history: 20         # 回看 20 個交易日
    bidirectional: false  # 預測任務不看未來
    dropout: 0.1
  gat:
    hidden_dim: 64
    num_layers: 2
    num_heads: 4
    dropout: 0.1
    use_edge_attr: true   # 邊權 |ρ| 餵入 attention
    concat: true          # heads 用 concat（最後一層改 average）
  projection:
    d_prime: 32           # 共同潛在維度
    activation: gelu
    layer_norm: true
  fusion:
    attention_hidden: 64
    gate_activation: sigmoid
  prediction_head:
    hidden_dim: 64
    dropout: 0.2

loss_weights:
  mse: 1.0
  rank: 0.5             # M4.5 Phase 1: 0.1 → 0.5（強迫學排序）
  align: 0.0            # M4.5 Phase 1: 0.1 → 0.0（關掉反向學的 align loss）
  variance: 0.1         # M4.5 Phase 2: 新增，對抗 prediction collapse（std(ŷ)→std(y)）

align_loss:
  enabled: false        # M4.5 Phase 1: 同步停用
  temperature: 0.1

training:
  seed: 42
  max_epochs: 100
  patience: 15           # M4.5 Phase 1: 10 → 15（給更多耐心觀察收斂）
  batch_size: 32
  lr: 0.001              # M4.5 Phase 2: 3e-3 → 1e-3（Phase 1 觀察到 3e-3 後期會崩盤）
  weight_decay: 0.001    # M4.5 Phase 1: 0.0001 → 0.001（10× regularization）
  device: auto           # auto | cpu | mps | cuda
  num_workers: 0         # MPS 上建議 0（multiprocessing 不穩）
  pin_memory: false
  grad_clip: 1.0         # 梯度裁剪上限
  log_every_n_steps: 10  # console print 頻率
  min_delta: 0.0         # IC 改善判定下限
  early_stop_metric: IC  # 監控 val 上的 IC（越大越好）

mlflow:
  experiment_name: MAGNET_M4_baseline
  tracking_uri: file:./mlruns
  log_artifacts: true
